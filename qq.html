<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gundam Shop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    padding:20px;
    font-family:Arial, sans-serif;
}

.filterable_cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card{
    border:1px solid #ccc;
    padding:15px;
    border-radius:10px;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    background:#eee;
}

.card h3{
    margin:10px 0;
}

button{
    margin-top:10px;
    padding:8px 15px;
}
</style>
</head>
<body>

<h1>Gundam Shop</h1>
<br>

<div class="filterable_cards"></div>

<script src="qq.js"></script>

<script src="./navbar.js"></script>
</body>
</html>
