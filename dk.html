<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <link rel="stylesheet" href="./dk.css">
</head>

<body>

  <div class="login-page">
    <div class="form">
      <form class="register-form">
   
        <input type="text" id="username" placeholder="Username" required />
        <input type="email" id="email" placeholder="Email address" required />
        <input type="password" id="password" placeholder="Password" required />
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required />

        <button type="submit" style="color: white;">Create Account</button>

        <p class="message" style="color: red;">
          Already have an account? <a href="./dkdn.html">Log In</a>
        </p>
        <p class="message" style="color: red;">
          Forgot password? <a href="./quenpass.html">Reset password here</a>
        </p>
      </form>
    </div>
  </div>

  <script src="./dk.js"></script>
<script src="./navbar.js"></script>
</body>

</html>
